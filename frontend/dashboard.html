<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    .app { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    nav {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 32px;
    }
    .nav-logo { font-size: 18px; font-weight: 700; }
    .nav-user { display: flex; align-items: center; gap: 12px; }
    .avatar {
      width: 36px; height: 36px; background: var(--accent2);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 14px;
    }
    #username { font-size: 14px; color: var(--muted); }
    #signout-btn {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); padding: 7px 14px; font-size: 13px;
    }
    #signout-btn:hover { color: var(--danger); border-color: var(--danger); }

    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 12px; margin-bottom: 28px;
    }
    @media (max-width: 600px) { .stats { grid-template-columns: repeat(2, 1fr); } }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; text-align: center;
    }
    .stat-number { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .main-grid {
      display: grid; grid-template-columns: 320px 1fr;
      gap: 24px; align-items: start;
    }
    @media (max-width: 700px) { .main-grid { grid-template-columns: 1fr; } }

    .form-card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--muted); margin-bottom: 5px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .alert.error { margin-bottom: 14px; }
    .form-actions { display: flex; gap: 8px; margin-top: 18px; }
    .form-actions .btn-primary { flex: 1; }
    #cancel-btn { display: none; }

    .tasks-panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; }
    .toolbar input { flex: 1; }
    .toolbar select { width: 150px; }

    .task-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      margin-bottom: 10px; transition: border-color .2s;
    }
    .task-card:hover { border-color: var(--accent); }
    .task-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; gap: 8px;
    }
    .task-title { font-weight: 600; font-size: 15px; }
    .task-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .task-desc { font-size: 13px; color: var(--muted); margin: 6px 0 10px; }
    .task-meta { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .due-date { font-size: 12px; color: var(--muted); margin-left: auto; }
  </style>
</head>
<body>

<script>
  // اقرأ الـ token من hash إذا جاء من Google OAuth
  const hash = window.location.hash;
  if (hash.startsWith('#token=')) {
    localStorage.setItem('token', hash.slice(7));
    window.history.replaceState({}, '', '/dashboard.html');
  }
  // guard
  if (!localStorage.getItem('token')) {
    window.location.href = '/index.html';
  }
</script>

<div class="app">

  <nav>
    <span class="nav-logo">✅ Todo App</span>
    <div class="nav-user">
      <div class="avatar" id="avatar">?</div>
      <span id="username">...</span>
      <button id="signout-btn">Sign out</button>
    </div>
  </nav>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-number" id="stat-total">—</div>
      <div class="stat-label">Total tasks</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-done" style="color:var(--success)">—</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-progress" style="color:var(--warning)">—</div>
      <div class="stat-label">In progress</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="stat-todo" style="color:var(--muted)">—</div>
      <div class="stat-label">Todo</div>
    </div>
  </div>

  <div class="main-grid">

    <div class="card form-card">
      <h2 id="form-title">New Task</h2>
      <div class="alert error" id="form-alert"></div>
      <form id="task-form">
        <div class="form-group">
          <label>Title *</label>
          <input type="text" name="title" placeholder="Task title" required/>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea name="description" placeholder="Optional description" rows="2" style="resize:vertical"></textarea>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Priority</label>
            <select name="priority">
              <option value="medium">Medium</option>
              <option value="high">High</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select name="status">
              <option value="in-progress">In progress</option>
              <option value="todo">Todo</option>
              <option value="done">Done</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Due date</label>
          <input type="datetime-local" name="dueDate"/>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Add task</button>
          <button type="button" id="cancel-btn" class="btn-danger">Cancel</button>
        </div>
      </form>
    </div>

    <div class="tasks-panel">
      <h2>My Tasks</h2>
      <div class="toolbar">
        <input type="text" id="search" placeholder="🔍 Search tasks..."/>
        <select id="filter-status">
          <option value="all">All</option>
          <option value="todo">Todo</option>
          <option value="in-progress">In progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div id="task-list">
        <div class="empty"><span>📋</span> Loading tasks...</div>
      </div>
    </div>

  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
