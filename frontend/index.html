<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
  <style>
    /* ── Auth layout ── */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
    }
    .logo p {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      color: var(--muted);
      border-radius: 7px;
      padding: 9px;
      font-weight: 500;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
    }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Form ── */
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--muted);
      font-size: 12px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Google button ── */
    #google-btn {
      width: 100%;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 500;
    }
    #google-btn:hover { border-color: var(--accent); }

    .google-icon {
      width: 18px;
      height: 18px;
    }
  </style>
</head>
<body>

<div class="auth-box">
  <!-- Logo -->
  <div class="logo">
    <h1>✅ Todo App</h1>
    <p>Manage your tasks, simply.</p>
  </div>

  <!-- Card -->
  <div class="card">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Sign in</button>
      <button class="tab-btn"        data-tab="signup">Sign up</button>
    </div>

    <!-- Login -->
    <div class="tab-panel active" id="login">
      <div class="alert error" id="login-alert"></div>

      <form id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="••••••••" required/>
        </div>
        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <div class="divider">or</div>

      <button id="google-btn">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- Signup -->
    <div class="tab-panel" id="signup">
      <div class="alert error" id="signup-alert"></div>

      <form id="signup-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Your name" required minlength="3"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Min. 6 characters" required minlength="6"/>
        </div>
        <button type="submit" class="btn-primary">Create account</button>
      </form>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
